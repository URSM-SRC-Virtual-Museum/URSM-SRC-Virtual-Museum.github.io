<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Virtual Museum - Interactive Layers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --container-max-width: 900px;
            --accent-gold: #ffd700;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #1e2a4a 0%, #0a0e1a 100%);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow-x: hidden;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Exit Button */
        .exit-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            color: white;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 18px;
            border-radius: 4px;
            transition: all 0.3s ease;
            z-index: 200;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .exit-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Title Area */
        .header-section {
            text-align: center;
            margin-bottom: 20px;
            z-index: 110;
        }

        .museum-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin: 0;
            padding: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #bbbbbb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .museum-title:hover { transform: scale(1.05); }

        /* Container & Layers */
        .container {
            position: relative;
            width: 100%;
            max-width: var(--container-max-width);
            aspect-ratio: 900 / 550;
            margin: 0 auto;
        }

        .layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.5));
        }

        #layer1 { z-index: 1; } 
        #layer4 { z-index: 2; } 
        #layer3 { z-index: 3; } 
        #layer2 { z-index: 4; } 

        .container.title-hovered .layer:not(#layer1) {
            transform: translateY(-20px) scale(1.03);
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6));
        }

        /* Label Styling (Desktop) */
        .section-label {
            position: absolute;
            z-index: 50; opacity: 0;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .label-title {
            font-size: 1.5rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 5px; white-space: nowrap;
        }

        .label-line {
            width: 2px; height: 40px;
            background: var(--accent-gold);
            margin: 10px 0; transition: height 0.4s ease;
        }

        .explore-btn {
            font-size: 0.7rem; letter-spacing: 2px;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 5px 15px; display: inline-block;
            margin-top: 10px;
        }

        #label-descriptive { right: -120px; top: 10%; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        #label-experimental { left: -120px; top: 20%; text-align: left; }
        #label-developmental { right: -150px; bottom: 15%; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }

        /* Hover States */
        .container.has-hover .layer:not(.is-hovered) { opacity: 0.2; filter: blur(5px) grayscale(1); }
        .layer.is-hovered {
            transform: scale(1.05) translateY(-10px);
            opacity: 1 !important; filter: drop-shadow(0 20px 50px rgba(0,0,0,0.8)) !important; z-index: 100 !important;
        }
        .section-label.visible { opacity: 1; color: var(--accent-gold); }
        .section-label.visible .label-line { height: 60px; }

        /* Mobile Menu (Hidden on Desktop) */
        .mobile-menu {
            display: none;
            width: 100%;
            max-width: 400px;
            margin-top: 30px;
            gap: 15px;
        }

        .mobile-menu a {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 20px; border-radius: 8px;
            color: white; text-decoration: none; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.85rem; font-weight: 600;
            transition: all 0.3s ease;
        }

        .mobile-menu a:hover, .mobile-menu a:active {
            background: rgba(255,255,255,0.15); border-color: var(--accent-gold);
            color: var(--accent-gold); transform: translateY(-2px);
        }

        /* Footer */
        .footer-info {
            margin-top: 40px; text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 30px; width: 100%; max-width: 800px;
        }

        .logo-row {
            display: flex; justify-content: center; align-items: center;
            flex-wrap: wrap; gap: 15px; margin-bottom: 20px;
        }

        .logo-row img { height: clamp(35px, 6vw, 50px); width: auto; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .logo-row img[alt="University Logo"] { height: clamp(60px, 10vw, 85px); margin: 0 5px; }

        /* --- RESPONSIVENESS (MOBILE SPECIFIC FIXES) --- */
        @media (max-width: 900px) {
            .section-label { display: none !important; } /* Hide floating labels on small screens */
            .mobile-menu { display: flex; flex-direction: column; } /* Show stacked menu */
            .container { pointer-events: none; } /* Disable complex layer hover on mobile to prevent jank */
        }

        @media (max-width: 600px) {
            body { 
                padding: 15px; 
                justify-content: flex-start; /* Prevents vertical centering from pushing content off screen */
            }
            .header-section { 
                margin-top: 70px; /* Pushes title down so the fixed exit button doesn't block it */
            }
            .exit-btn {
                top: 15px; left: 15px;
                font-size: 0.65rem;
                padding: 8px 12px;
            }
            .container {
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <a href="index.php" class="exit-btn">← Exit Virtual Museum</a>

    <div class="header-section">
        <h1 class="museum-title" id="mainTitle">Research Virtual Museum</h1>
    </div>

    <div class="container" id="layerContainer">
        <img src="1.png" id="layer1" class="layer" alt="Base">
        <img src="4.png" id="layer4" class="layer interactive-layer" alt="Descriptive">
        <img src="3.png" id="layer3" class="layer interactive-layer" alt="Experimental">
        <img src="2.png" id="layer2" class="layer interactive-layer" alt="Developmental">

        <div id="label-descriptive" class="section-label">
            <div class="label-title">Descriptive<br>Research</div>
            <div class="label-line"></div>
            <div class="explore-btn">EXPLORE</div>
        </div>

        <div id="label-experimental" class="section-label">
            <div class="label-title">Experimental<br>Research</div>
            <div class="label-line"></div>
            <div class="explore-btn">EXPLORE</div>
        </div>

        <div id="label-developmental" class="section-label">
            <div class="label-title">Developmental<br>Research</div>
            <div class="label-line"></div>
            <div class="explore-btn">EXPLORE</div>
        </div>
    </div>

    <div class="mobile-menu">
        <a href="descriptive-room.html"><span>Descriptive Research</span> <span>&rarr;</span></a>
        <a href="experimental-room.html"><span>Experimental Research</span> <span>&rarr;</span></a>
        <a href="developmental-room.html"><span>Developmental Research</span> <span>&rarr;</span></a>
    </div>

    <div class="footer-info">
        <div class="logo-row">
            <img src="assets/logo-coe.png" alt="COE Logo">
            <img src="assets/logo-cit.png" alt="CIT Logo">
            <img src="assets/logo-urs.png" alt="University Logo">
            <img src="assets/logo-cos.png" alt="COS Logo">
            <img src="assets/logo-coeng.png" alt="COENG Logo">
        </div>
        <div style="font-weight: 300; font-style: italic; letter-spacing: 2px; font-size: 1.1rem;">
            "Nurturing Tomorrow's Noblest"
        </div>
        <div style="font-size: 0.75rem; margin-top: 8px; opacity: 0.6; letter-spacing: 1px;">
            UNIVERSITY OF RIZAL SYSTEM - MORONG CAMPUS
        </div>
    </div>

    <script>
        const container = document.getElementById('layerContainer');
        const mainTitle = document.getElementById('mainTitle');
        const labels = {
            experimental: document.getElementById('label-experimental'),
            descriptive: document.getElementById('label-descriptive'),
            developmental: document.getElementById('label-developmental')
        };

        const links = {
            descriptive: 'descriptive-room.html',
            experimental: 'experimental-room.html',
            developmental: 'developmental-room.html'
        };

        const interactiveLayers = [
            { element: document.getElementById('layer2'), labelKey: 'developmental' },
            { element: document.getElementById('layer3'), labelKey: 'experimental' },
            { element: document.getElementById('layer4'), labelKey: 'descriptive' }
        ];

        mainTitle.addEventListener('mouseenter', () => container.classList.add('title-hovered'));
        mainTitle.addEventListener('mouseleave', () => container.classList.remove('title-hovered'));

        const layerCanvases = new Map();

        function getPixelData(img, x, y) {
            if (!layerCanvases.has(img.id)) {
                const canvas = document.createElement('canvas');
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                layerCanvases.set(img.id, ctx);
            }
            const ctx = layerCanvases.get(img.id);
            return ctx.getImageData(x, y, 1, 1).data;
        }

        // Only run interactive logic if screen is large enough
        if (window.innerWidth > 900) {
            function findLayerAt(e) {
                for (const { element, labelKey } of interactiveLayers) {
                    const rect = element.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;

                    if (x >= 0 && y >= 0 && x <= rect.width && y <= rect.height) {
                        const scaleX = element.naturalWidth / rect.width;
                        const scaleY = element.naturalHeight / rect.height;
                        const pixelData = getPixelData(element, Math.floor(x * scaleX), Math.floor(y * scaleY));

                        if (pixelData[3] > 50) { return { element, labelKey }; }
                    }
                }
                return null;
            }

            container.addEventListener('mousemove', (e) => {
                const hovered = findLayerAt(e);
                interactiveLayers.forEach(({ element, labelKey }) => {
                    element.classList.remove('is-hovered');
                    labels[labelKey].classList.remove('visible');
                });

                if (hovered) {
                    hovered.element.classList.add('is-hovered');
                    labels[hovered.labelKey].classList.add('visible');
                    container.classList.add('has-hover');
                    container.style.cursor = 'pointer';
                } else {
                    container.classList.remove('has-hover');
                    container.style.cursor = 'default';
                }
            });

            container.addEventListener('click', (e) => {
                const clicked = findLayerAt(e);
                if (clicked && links[clicked.labelKey]) {
                    window.location.href = links[clicked.labelKey];
                }
            });

            container.addEventListener('mouseleave', () => {
                interactiveLayers.forEach(({ element, labelKey }) => {
                    element.classList.remove('is-hovered');
                    labels[labelKey].classList.remove('visible');
                });
                container.classList.remove('has-hover');
            });
        }
    </script>
</body>
</html>
